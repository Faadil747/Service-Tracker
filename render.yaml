# Render Blueprint for the FastAPI backend.
# Deploy: push this repo to GitHub → Render → New → Blueprint → pick this repo.
# Then fill the `sync: false` env vars in the Render dashboard (see DEPLOYMENT.md).
services:
  - type: web
    name: social-tracker-api
    runtime: docker          # Docker image installs the Microsoft ODBC driver for MS SQL
    rootDir: backend
    dockerfilePath: backend/Dockerfile
    plan: free
    healthCheckPath: /health
    envVars:
      - key: SECRET_KEY
        generateValue: true          # Render generates a strong value
      # ── Database ──────────────────────────────────────────────────────────
      # Option A (current): MS SQL Server — set all five DB_* vars and the app uses
      # MSSQL via the ODBC driver baked into the Docker image (ignores DATABASE_URL).
      - key: DB_SERVER
        sync: false                  # e.g. P3NWPLSK12SQL-v08.shr.prod.phx3.secureserver.net
      - key: DB_DATABASE
        sync: false                  # e.g. LinkedInTest
      - key: DB_UID
        sync: false                  # SQL login user
      - key: DB_PWD
        sync: false                  # SQL login password
      - key: DB_DRIVER
        value: "ODBC Driver 17 for SQL Server"   # matches msodbcsql17 in the Dockerfile
      - key: DB_ENCRYPT
        value: "false"               # TrustServerCertificate handles TLS for this host
      # Option B (fallback): a managed MySQL/Postgres URL. Only used when the DB_*
      # vars above are NOT all set. Leave blank when using MS SQL.
      - key: DATABASE_URL
        sync: false                  # mysql+asyncmy://user:pass@host:3306/db (optional)
      - key: DB_SSL
        value: "true"                # managed MySQL/Postgres hosts require TLS
      - key: FRONTEND_URL
        sync: false                  # https://your-app.vercel.app
      - key: ALLOWED_ORIGINS
        sync: false                  # optional extra origins, comma-separated
      - key: BACKEND_PUBLIC_URL
        sync: false                  # https://social-tracker-api.onrender.com
      - key: DEV_MODE
        value: "false"
      - key: DEEPSEEK_API_KEY
        sync: false                  # optional (also settable in-app)
      - key: DEEPSEEK_MODEL
        value: deepseek-chat
      - key: LINKEDIN_ACCESS_TOKEN
        sync: false                  # optional (also settable in-app)
      - key: LINKEDIN_ORG_ID
        sync: false                  # optional
      - key: ADMIN_EMAIL
        sync: false                  # first admin login
      - key: ADMIN_PASSWORD
        sync: false                  # first admin password (strong!)
      - key: ADMIN_NAME
        value: Administrator
